<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" fill="none">
  <!-- Circle icon: center (48,50) radius 28, stroke-width 7 -->
  <!-- Dark navy arc: from 4-o-clock (72,64) clockwise (long way) back to 12-o-clock (48,22) = 240deg -->
  <path d="M 72 64 A 28 28 0 1 1 48 22" stroke="#1a3060" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Light blue arc: from 12-o-clock (48,22) clockwise to 4-o-clock (72,64) = 120deg -->
  <path d="M 48 22 A 28 28 0 0 1 72 64" stroke="#3a82c8" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Vertical stem of arrow (top) -->
  <line x1="48" y1="30" x2="48" y2="42" stroke="#3a82c8" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow shaft -->
  <line x1="48" y1="42" x2="48" y2="58" stroke="#3a82c8" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow chevron head -->
  <polyline points="38,50 48,62 58,50" stroke="#3a82c8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Text -->
  <text x="92" y="44" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="25" fill="#1a3060">Ontario</text>
  <text x="92" y="74" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="25" fill="#1a3060">Accident Review</text>
</svg>
